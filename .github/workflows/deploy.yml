name: Deploy SmartCookie

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/smartcookie
            git fetch origin main
            git reset --hard origin/main
            composer install --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan optimize
            # Register Laravel scheduler in system crontab (idempotent)
            CRON_JOB="* * * * * $(which php) /var/www/smartcookie/artisan schedule:run >> /var/log/laravel-scheduler.log 2>&1"
            ( crontab -l 2>/dev/null | grep -v 'artisan schedule:run'; echo "$CRON_JOB" ) | crontab -
